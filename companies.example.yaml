  #     ASHBY_QUERY: "software"
  #     ASHBY_US_ONLY: "true"

  # Template adapter example:
  # Use this for UI-only filters after capturing the underlying request.
  - name: Example Template Source
    disabled: true
    source: template
    careers_url: https://example.com/careers
    fallback_sources: [playwright]
    timeout_seconds: 25
    template:
      method: GET
      url: https://example.com/api/jobs
      params:
        q: software
        location: remote
      jobs_path: data.jobs
      fields:
        id: id
        title: title
        url: url
        location: location.name
        team: department.name
        posted_at: published_at
      base_url: https://example.com

  # Command adapter example:
  # Use this to plug Playwright/Selenium scripts that return JSON jobs.
  - name: Dropbox (Playwright Fallback)
    disabled: true
    source: playwright
    careers_url: https://www.dropbox.jobs/en/jobs/?search=Software&location=Remote+-+US%3A+All+locations&pagesize=20
    timeout_seconds: 90
    command:
      - uv
      - run
      - python
      - scripts/fetch_jobs_playwright.py
    command_env:
      PW_MAX_LINKS: "60"
      PW_TIMEOUT_MS: "60000"
      PW_WAIT_AFTER_LOAD_MS: "3000"
      PW_INCLUDE_PATTERN: "/jobs/"
      # Optional:
      # PW_HEADLESS: "true"
      # PW_LINK_SELECTOR: "a[href]"

    # Optional fallback if browser script reports non-blocked errors:
    fallback_sources: [generic]
