companies:
  - name: GE HealthCare
    source: generic
    careers_url: https://careers.gehealthcare.com/global/en/search-results?keywords=sOFTWARE%20ENGINEERING
    max_links: 150
    timeout_seconds: 30
    # Optional: tuning data for future custom policies
    orchestration:
      profile: stable

  - name: Uber Engineering
    source: generic
    careers_url: https://www.uber.com/us/en/careers/list/?department=Engineering
    max_links: 150
    timeout_seconds: 30

  - name: Intuit
    source: generic
    careers_url: https://jobs.intuit.com/search-jobs/
    max_links: 150
    timeout_seconds: 30

  - name: My Greenhouse
    disabled: true
    source: my_greenhouse
    careers_url: https://my.greenhouse.io/jobs
    timeout_seconds: 120
    max_links: 250
    command_env:
      MY_GREENHOUSE_MAX_JOBS: "250"
      MY_GREENHOUSE_WAIT_AFTER_LOAD_MS: "3000"
      MY_GREENHOUSE_TIMEOUT_MS: "100000"
      MY_GREENHOUSE_QUERY: "software engineering"

  # API adapter examples:
